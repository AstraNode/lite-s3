version: '3.8'

services:
  s3-storage:
    build: .
    container_name: s3-object-storage
    ports:
      - "8081:80"
    volumes:
      - ./WWW:/var/www/html
    environment:
      - APACHE_RUN_USER=www-data
      - APACHE_RUN_GROUP=www-data
      - APACHE_LOG_DIR=/var/log/apache2
      - DB_TYPE=mysql
      - DB_HOST=mysql
      - DB_NAME=s3_storage
      - DB_USER=s3user
      - DB_PASS=s3pass123
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: s3-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass123
      - MYSQL_DATABASE=s3_storage
      - MYSQL_USER=s3user
      - MYSQL_PASSWORD=s3pass123
    ports:
      - "3307:3306"
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
