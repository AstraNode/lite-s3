; S3 Object Storage - PHP-FPM Configuration
; For PHP-FPM environments (common on shared hosting, NGINX)
; This file is read by PHP-FPM and overrides php.ini settings

; Upload limits for large S3 objects (up to 5GB)
upload_max_filesize = 5G
post_max_size = 5G
max_file_uploads = 100

; Execution time limits (12 hours for large uploads)
max_execution_time = 43200
max_input_time = 43200

; Memory limit
memory_limit = 512M

; Security settings
display_errors = Off
log_errors = On
error_log = logs/php_errors.log

; Session security
session.cookie_httponly = On
session.use_strict_mode = On
session.cookie_samesite = Lax

; Default timezone
date.timezone = UTC

; Output buffering (disabled for streaming large files)
output_buffering = Off

; Disable functions that could be security risks (optional)
; Uncomment if you want extra security on shared hosting
; disable_functions = exec,passthru,shell_exec,system,proc_open,popen
